<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionale | Autocarrozzeria Exclusive</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; color: #f4f4f5; margin: 0; min-height: 100vh; }
        .glass { background: rgba(24, 24, 27, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        input, select, textarea { background: #18181b !important; border: 1px solid #27272a !important; color: white !important; }
        input:focus, select:focus, textarea:focus { border-color: #dc2626 !important; outline: none; box-shadow: 0 0 0 1px #dc2626; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        .img-card:first-child { border: 2px solid #dc2626; }
    </style>
</head>
<body class="custom-scrollbar">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCB5yV6u4DtzUFb0jADUJobh8In52JNzp4",
            authDomain: "maxcar-7416d.firebaseapp.com",
            projectId: "maxcar-7416d",
            storageBucket: "maxcar-7416d.firebasestorage.app",
            messagingSenderId: "279232212865",
            appId: "1:279232212865:web:12cdcc47392b17aebb4280",
            measurementId: "G-1ZS56PTHDK"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        
        // Identificativo unificato per il collegamento al sito
        const appId = "autocarrozzeria-exclusive";
        const COLLECTION_PATH = `artifacts/${appId}/public/data/automobili`;

        const App = () => {
            const [autoList, setAutoList] = useState([]);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [editingId, setEditingId] = useState(null);
            
            const initialForm = {
                marca: '', modello: '', prezzo: '', anno: '', km: '', 
                alimentazione: 'Diesel', categoria: 'SUV', descrizione: '', 
                immagini: [], potenza: '', cilindrata: '', colore: ''
            };
            
            const [newCar, setNewCar] = useState(initialForm);

            useEffect(() => {
                const init = async () => {
                    await auth.signInAnonymously();
                    db.collection(COLLECTION_PATH).orderBy('createdAt', 'desc').onSnapshot(snap => {
                        setAutoList(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                        setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 100);
                    });
                };
                init();
            }, []);

            const handleFile = (e) => {
                const files = Array.from(e.target.files);
                const remainingSlots = 5 - newCar.immagini.length;
                const filesToProcess = files.slice(0, remainingSlots);

                filesToProcess.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = img.width;
                            let height = img.height;
                            const MAX_SIZE = 800; 

                            if (width > MAX_SIZE || height > MAX_SIZE) {
                                if (width > height) {
                                    height *= MAX_SIZE / width;
                                    width = MAX_SIZE;
                                } else {
                                    width *= MAX_SIZE / height;
                                    height = MAX_SIZE;
                                }
                            }

                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            const dataUrl = canvas.toDataURL('image/jpeg', 0.5);

                            setNewCar(prev => ({
                                ...prev,
                                immagini: [...prev.immagini, dataUrl].slice(0, 5)
                            }));
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                });
                e.target.value = ""; 
            };

            const moveImage = (index, direction) => {
                const newImgs = [...newCar.immagini];
                const targetIndex = index + direction;
                if (targetIndex < 0 || targetIndex >= newImgs.length) return;
                
                [newImgs[index], newImgs[targetIndex]] = [newImgs[targetIndex], newImgs[index]];
                setNewCar(prev => ({ ...prev, immagini: newImgs }));
            };

            const removeImage = (index) => {
                setNewCar(prev => ({
                    ...prev,
                    immagini: prev.immagini.filter((_, i) => i !== index)
                }));
            };

            const startEdit = (car) => {
                setEditingId(car.id);
                setNewCar({
                    marca: car.marca || '',
                    modello: car.modello || '',
                    prezzo: car.prezzo || '',
                    anno: car.anno || '',
                    km: car.km || '',
                    alimentazione: car.alimentazione || 'Diesel',
                    categoria: car.categoria || 'SUV',
                    descrizione: car.descrizione || '',
                    potenza: car.potenza || '',
                    cilindrata: car.cilindrata || '',
                    colore: car.colore || '',
                    immagini: car.galleria || (car.immagine ? [car.immagine] : [])
                });
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const cancelEdit = () => {
                setEditingId(null);
                setNewCar(initialForm);
            };

            const saveCar = async (e) => {
                e.preventDefault();
                if (newCar.immagini.length === 0) {
                    alert("Attenzione: Inserisci almeno una foto per l'annuncio!");
                    return;
                }
                
                setIsSubmitting(true);
                try {
                    const payload = {
                        marca: newCar.marca,
                        modello: newCar.modello,
                        prezzo: Number(newCar.prezzo),
                        km: Number(newCar.km),
                        anno: Number(newCar.anno),
                        alimentazione: newCar.alimentazione,
                        categoria: newCar.categoria,
                        descrizione: newCar.descrizione,
                        potenza: newCar.potenza ? Number(newCar.potenza) : null,
                        cilindrata: newCar.cilindrata ? Number(newCar.cilindrata) : null,
                        colore: newCar.colore || '',
                        immagine: newCar.immagini[0], 
                        galleria: newCar.immagini,   
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    };

                    if (editingId) {
                        await db.collection(COLLECTION_PATH).doc(editingId).update(payload);
                    } else {
                        payload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                        await db.collection(COLLECTION_PATH).add(payload);
                    }
                    
                    cancelEdit();
                } catch (error) {
                    console.error(error);
                    alert("Errore durante il salvataggio nel Cloud. Riprova.");
                }
                setIsSubmitting(false);
            };

            const deleteCar = async (id) => {
                if(confirm("Sei sicuro di voler eliminare definitivamente questo veicolo dalla vetrina?")) {
                    await db.collection(COLLECTION_PATH).doc(id).delete();
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <header className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
                        <div className="flex items-center gap-4">
                            <div className="bg-red-600 p-3 rounded-2xl shadow-lg shadow-red-600/30 text-white">
                                <i data-lucide="shield" className="w-6 h-6"></i>
                            </div>
                            <div>
                                <h1 className="text-2xl font-black uppercase tracking-tight">Gestionale <span className="text-red-600">Exclusive</span></h1>
                                <p className="text-[10px] uppercase tracking-[0.2em] text-zinc-400 font-bold">Autocarrozzeria & Vendita Auto - Daniele Nicosia</p>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
                        {/* Form Area */}
                        <div className="lg:col-span-1">
                            <form onSubmit={saveCar} className="glass p-6 rounded-[2rem] sticky top-8">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-lg font-bold flex items-center gap-2 uppercase tracking-tight">
                                        <i data-lucide={editingId ? "edit" : "plus-circle"} className="w-5 h-5 text-red-500"></i> 
                                        {editingId ? 'Modifica Veicolo' : 'Nuovo Veicolo'}
                                    </h2>
                                    {editingId && (
                                        <button type="button" onClick={cancelEdit} className="text-[10px] font-bold uppercase text-zinc-400 hover:text-white transition">Annulla</button>
                                    )}
                                </div>

                                <div className="space-y-4">
                                    <div className="grid grid-cols-3 gap-2">
                                        {newCar.immagini.map((img, idx) => (
                                            <div key={idx} className="img-card relative aspect-square rounded-xl overflow-hidden bg-zinc-900 group">
                                                <img src={img} className="w-full h-full object-cover" />
                                                <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col justify-between p-1">
                                                    <div className="flex justify-between">
                                                        <button type="button" onClick={() => moveImage(idx, -1)} className="bg-white/10 hover:bg-white/30 p-1 rounded backdrop-blur-md">
                                                            <i data-lucide="chevron-left" className="w-3 h-3 text-white"></i>
                                                        </button>
                                                        <button type="button" onClick={() => removeImage(idx)} className="bg-red-600 hover:bg-red-700 p-1 rounded">
                                                            <i data-lucide="x" className="w-3 h-3 text-white"></i>
                                                        </button>
                                                        <button type="button" onClick={() => moveImage(idx, 1)} className="bg-white/10 hover:bg-white/30 p-1 rounded backdrop-blur-md">
                                                            <i data-lucide="chevron-right" className="w-3 h-3 text-white"></i>
                                                        </button>
                                                    </div>
                                                </div>
                                                {idx === 0 && <div className="absolute bottom-0 left-0 right-0 bg-red-600 text-[8px] text-center font-bold uppercase py-0.5 text-white">Copertina</div>}
                                            </div>
                                        ))}
                                        
                                        {newCar.immagini.length < 5 && (
                                            <label className="flex flex-col items-center justify-center aspect-square rounded-xl border-2 border-dashed border-zinc-700 hover:border-red-500 hover:bg-red-500/10 cursor-pointer transition">
                                                <i data-lucide="camera" className="w-5 h-5 mb-1 text-zinc-500"></i>
                                                <span className="text-[8px] font-bold uppercase text-zinc-500">Aggiungi</span>
                                                <input type="file" className="hidden" accept="image/*" multiple onChange={handleFile} />
                                            </label>
                                        )}
                                    </div>

                                    <div className="grid grid-cols-2 gap-3">
                                        <input required placeholder="Marca" className="p-3 rounded-xl text-sm" value={newCar.marca} onChange={e => setNewCar({...newCar, marca: e.target.value})} />
                                        <input required placeholder="Modello" className="p-3 rounded-xl text-sm" value={newCar.modello} onChange={e => setNewCar({...newCar, modello: e.target.value})} />
                                    </div>

                                    <div className="grid grid-cols-3 gap-2">
                                        <input required type="number" placeholder="Prezzo (€)" className="p-3 rounded-xl text-sm" value={newCar.prezzo} onChange={e => setNewCar({...newCar, prezzo: e.target.value})} />
                                        <input required type="number" placeholder="Anno" className="p-3 rounded-xl text-sm" value={newCar.anno} onChange={e => setNewCar({...newCar, anno: e.target.value})} />
                                        <input required type="number" placeholder="KM" className="p-3 rounded-xl text-sm" value={newCar.km} onChange={e => setNewCar({...newCar, km: e.target.value})} />
                                    </div>

                                    <div className="grid grid-cols-3 gap-2">
                                        <input type="number" placeholder="Potenza (CV)" className="p-3 rounded-xl text-sm" value={newCar.potenza} onChange={e => setNewCar({...newCar, potenza: e.target.value})} />
                                        <input type="number" placeholder="Cilindrata (cc)" className="p-3 rounded-xl text-sm" value={newCar.cilindrata} onChange={e => setNewCar({...newCar, cilindrata: e.target.value})} />
                                        <input placeholder="Colore" className="p-3 rounded-xl text-sm" value={newCar.colore} onChange={e => setNewCar({...newCar, colore: e.target.value})} />
                                    </div>

                                    <div className="grid grid-cols-2 gap-3">
                                        <select className="p-3 rounded-xl text-sm" value={newCar.alimentazione} onChange={e => setNewCar({...newCar, alimentazione: e.target.value})}>
                                            <option>Diesel</option>
                                            <option>Benzina</option>
                                            <option>Ibrida</option>
                                            <option>Elettrica</option>
                                            <option>GPL</option>
                                            <option>Metano</option>
                                        </select>
                                        <select className="p-3 rounded-xl text-sm" value={newCar.categoria} onChange={e => setNewCar({...newCar, categoria: e.target.value})}>
                                            <option>SUV</option>
                                            <option>Berlina</option>
                                            <option>Utilitaria</option>
                                            <option>Station Wagon</option>
                                            <option>Coupé</option>
                                            <option>Cabrio</option>
                                            <option>Furgone</option>
                                        </select>
                                    </div>

                                    <textarea 
                                        placeholder="Descrizione tecnica, optional e stato del veicolo..." 
                                        className="w-full p-3 rounded-xl text-sm min-h-[100px] resize-none"
                                        value={newCar.descrizione}
                                        onChange={e => setNewCar({...newCar, descrizione: e.target.value})}
                                    ></textarea>

                                    <button 
                                        disabled={isSubmitting}
                                        className={`w-full py-4 rounded-2xl font-bold uppercase tracking-widest text-sm transition text-white shadow-lg ${isSubmitting ? 'bg-zinc-800 animate-pulse' : 'bg-red-600 hover:bg-red-500 shadow-red-600/20 hover:shadow-red-500/40'}`}
                                    >
                                        {isSubmitting ? 'Salvataggio...' : (editingId ? 'Aggiorna Annuncio' : 'Pubblica Online')}
                                    </button>
                                </div>
                            </form>
                        </div>

                        {/* Inventory List */}
                        <div className="lg:col-span-2 space-y-4">
                            <div className="flex justify-between items-end mb-2 px-2">
                                <h2 className="font-bold uppercase tracking-widest text-xs text-zinc-500">Parco Auto ({autoList.length})</h2>
                                <div className="flex items-center gap-2">
                                    <span className="relative flex h-2 w-2">
                                      <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                                      <span className="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                                    </span>
                                    <p className="text-[10px] text-zinc-500 font-bold uppercase">Cloud Database Attivo</p>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {autoList.map(car => (
                                    <div key={car.id} className="glass p-4 rounded-3xl flex gap-4 items-center group relative overflow-hidden hover:bg-zinc-800/50 transition-all border border-zinc-800/50 hover:border-red-500/30">
                                        <div className="w-24 h-24 rounded-2xl overflow-hidden flex-shrink-0 bg-zinc-900 border border-zinc-800 relative">
                                            <img src={car.immagine} className="w-full h-full object-cover" />
                                            {car.immagini && car.immagini.length > 1 && (
                                                <div className="absolute bottom-1 right-1 bg-black/60 backdrop-blur-sm text-white text-[8px] font-bold px-1.5 py-0.5 rounded">
                                                    +{car.immagini.length - 1}
                                                </div>
                                            )}
                                        </div>
                                        <div className="flex-grow">
                                            <h3 className="font-bold uppercase text-sm leading-tight text-white">{car.marca} <span className="text-red-500">{car.modello}</span></h3>
                                            <div className="text-[10px] text-zinc-400 font-bold mt-1 uppercase">
                                                {car.anno} • {car.km?.toLocaleString()} KM • <span className="text-white">€{car.prezzo?.toLocaleString()}</span>
                                            </div>
                                            <div className="flex flex-wrap gap-1.5 mt-2">
                                                {car.potenza && <span className="text-[8px] bg-red-500/10 border border-red-500/20 px-1.5 py-0.5 rounded text-red-400 font-bold uppercase">{car.potenza} CV</span>}
                                                {car.cilindrata && <span className="text-[8px] bg-zinc-800 px-1.5 py-0.5 rounded text-zinc-300 font-bold uppercase">{car.cilindrata} cc</span>}
                                                {car.colore && <span className="text-[8px] bg-zinc-800 px-1.5 py-0.5 rounded text-zinc-300 font-bold uppercase">{car.colore}</span>}
                                            </div>
                                        </div>
                                        
                                        <div className="flex flex-col gap-2">
                                            <button onClick={() => startEdit(car)} className="p-2 bg-zinc-800 text-zinc-400 rounded-lg md:opacity-0 group-hover:opacity-100 transition hover:bg-white hover:text-black">
                                                <i data-lucide="edit-2" className="w-4 h-4"></i>
                                            </button>
                                            <button onClick={() => deleteCar(car.id)} className="p-2 bg-red-500/10 text-red-500 rounded-lg md:opacity-0 group-hover:opacity-100 transition hover:bg-red-600 hover:text-white">
                                                <i data-lucide="trash-2" className="w-4 h-4"></i>
                                            </button>
                                        </div>
                                    </div>
                                ))}
                                
                                {autoList.length === 0 && (
                                    <div className="col-span-full py-12 text-center border-2 border-dashed border-zinc-800 rounded-3xl">
                                        <i data-lucide="car" className="w-12 h-12 text-zinc-700 mx-auto mb-3"></i>
                                        <p className="text-sm font-bold text-zinc-500 uppercase">Nessuna auto nel database</p>
                                        <p className="text-xs text-zinc-600 mt-1">Utilizza il modulo per aggiungere la prima vettura.</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
